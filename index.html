<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="css/calculadora.css">
</head>
<body>
    <div class="case">
        <section class="tela">
            0
        </section>
        <section class="botoes-calc">
            <div class="btn-fileira">
                <button>C</button>
                <button>Del</button>
                <button>&div;</button>
            </div>
            <div class="btn-fileira">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>&times;</button>
            </div>
            <div class="btn-fileira">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>&minus;</button>
            </div>
            <div class="btn-fileira">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>&plus;</button>
            </div>
            <div class="btn-fileira">
                <button>0</button>
                <button>.</button>
                <button>=</button>
            </div>
        </section>

    </div>
    
</body>
</html>
