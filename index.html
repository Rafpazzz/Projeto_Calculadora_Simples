<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="css/calculadora.css">
</head>
<body>
    <div class="case">
        <section class="tela">
            0
        </section>
        <section class="botoes-calc">
            <div class="btn-fileira">
                <button class="btn-calc um">C</button>
                <button class="btn-calc">Del</button>
                <button class="btn-calc">&div;</button>
            </div>
            <div class="btn-fileira">
                <button class="btn-calc">7</button>
                <button class="btn-calc">8</button>
                <button class="btn-calc">9</button>
                <button class="btn-calc">&times;</button>
            </div>
            <div class="btn-fileira">
                <button class="btn-calc">4</button>
                <button class="btn-calc">5</button>
                <button class="btn-calc">6</button>
                <button class="btn-calc">&minus;</button>
            </div>
            <div class="btn-fileira">
                <button class="btn-calc">1</button>
                <button class="btn-calc">2</button>
                <button class="btn-calc">3</button>
                <button class="btn-calc">&plus;</button>
            </div>
            <div class="btn-fileira">
                <button class="btn-calc dois">0</button>
                <button class="btn-calc">.</button>
                <button class="btn-calc">=</button>
            </div>
        </section>
    </div>
    <script src="js/scripts.js"></script>
</body>
    
</html>
